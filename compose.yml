services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookrunner}
      POSTGRES_USER: ${POSTGRES_USER:-bookrunner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookrunner}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bookrunner.sql:/docker-entrypoint-initdb.d/01-bookrunner.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookrunner} -d ${POSTGRES_DB:-bookrunner}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://bookrunner:bookrunner@db:5432/bookrunner}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:http').get('http://127.0.0.1:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:3000:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

volumes:
  postgres_data:
